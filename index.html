<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Overlay for Age of Empires II: Definitive Edition, ranked 1v1 games">
    <meta name="author" content="Monkie (qtds35k)">
    <title>AOE2:DE Ranked 1v1 Overlay</title>
    <style>
        body {
            background-color: rgba(0, 0, 0, 1);
            margin: 0;
            padding: 0;
        }

        .BodyConScore {
            background-color: rgba(0, 0, 0, 0)
        }

        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
    <link rel="icon" href="webicon.ico">
    <link rel="stylesheet" type="text/css" href="css/index.css?v=13">
</head>

<body>
    <div id="overlay-1v1" style="display: none;">
        <table>
        <tr>
            <th class="playerName main-column" id="playerName1">Streamer</th>
            <th class="playerName main-column" id="playerName2">Opponent</th>
        </tr>
        <tr>
            <td class="playerSection main-column">
                <div class="backgroundEmblemContainer" id="backgroundEmblem1"></div>
                <table class="statsTable">
                    <tr>
                        <th class="statsHeader">Current Elo</th>
                        <th class="statsHeader">Max Elo</th>
                        <th class="statsHeader">Games</th>
                        <th class="statsHeader">Winrate</th>
                    </tr>
                    <tr>
                        <td class="statsValueCurrentElo" id="playerCurrentElo1"></td>
                        <td class="statsValue" id="playerMaxElo1"></td>
                        <td class="statsValue" id="playerTotalGames1"></td>
                        <td class="statsValue" id="playerWinrate1"></td>
                    </tr>
                </table>
                <div id="lastUsedCivs1" class="civHistoryContainer"></div>
            </td>
            <td class="playerSection main-column">
                <div class="backgroundEmblemContainer" id="backgroundEmblem2"></div>
                <table class="statsTable">
                    <tr>
                        <th class="statsHeader">Current Elo</th>
                        <th class="statsHeader">Max Elo</th>
                        <th class="statsHeader">Games</th>
                        <th class="statsHeader">Winrate</th>
                    </tr>
                    <tr>
                        <td class="statsValueCurrentElo" id="playerCurrentElo2"></td>
                        <td class="statsValue" id="playerMaxElo2"></td>
                        <td class="statsValue" id="playerTotalGames2"></td>
                        <td class="statsValue" id="playerWinrate2"></td>
                    </tr>
                </table>
                <div id="lastUsedCivs2" class="civHistoryContainer"></div>
            </td>
        </tr>
    </table>
    </div>
    
    <div id="overlay-team" style="display: none;">
        <table>
            <tr>
                <th class="playerName main-column" id="playerNameTeam1">Streamer's team</th>
                <th class="playerName main-column" id="playerNameTeam2">Opponent's team</th>
            </tr>
            <tr>
                <td class="playerSection main-column">
                    <div class="backgroundEmblemContainer" id="backgroundEmblemTeam1"></div>
                    <table class="statsTable" id="statsTableTeam1">
                        <thead>
                            <tr>
                                <th class="statsHeader">Player</th>
                                <th class="statsHeader">1v1 Elo (Win%)</th>
                                <th class="statsHeader">Team Elo</th>
                                <th class="statsHeader">Team Games</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </td>
                <td class="playerSection main-column">
                    <div class="backgroundEmblemContainer" id="backgroundEmblemTeam2"></div>
                    <table class="statsTable" id="statsTableTeam2">
                        <thead>
                            <tr>
                                <th class="statsHeader">Player</th>
                                <th class="statsHeader">1v1 Elo (Win%)</th>
                                <th class="statsHeader">Team Elo</th>
                                <th class="statsHeader">Team Games</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </td>
            </tr>
        </table>
    </div>
    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="js/utils.js"></script>
    <script type="text/javascript" src="js/index.js?v=21"></script>
</body>

</html>
